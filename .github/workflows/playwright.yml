name: Regression Automation Run with Smart Report 

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write    
  
jobs:
  test:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: List contains of working directory
        run: ls -R            

      - name: Install dependencies
        run: npm ci
        working-directory: ./Epico

      - name: Install Playwright Browsers
        run: npx playwright install chromium
        working-directory: ./Epico

      - name: Run Playwright tests
        run: npx playwright test ./tests/runner.spec.js --reporter=list,playwright-smart-reporter --output=test-results/
        working-directory: ./Epico
        continue-on-error: true

      - name: Prepare report for Pages
        if: always()
        run: |
          cp Epico/tests/smart-report.html Epico/tests/index.html
          ls Epico/tests/  

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Epico/tests/index.html

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Epico/tests/index.html
          publish_branch: gh-pages
          force_orphan: true

      - name: Send Playwright report via email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Playwright Test Report – Build #${{ github.run_number }}"
          body: |
            Hi Team,

            The Playwright test report for build #${{ github.run_number }} is available:

            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/index.html

            Workflow: ${{ github.workflow }}
            Triggered by: ${{ github.event_name }}

            Regards,
            Epico CI/CD Automation Bot
          to: ${{ secrets.Mail_Username }}
          from: ${{ secrets.EMAIL_USER }}    
